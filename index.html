<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="3;url=https://zundou.org">
    <title>promps.org - 移転のお知らせ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            border-radius: 12px;
            padding: 48px 32px;
            max-width: 600px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 16px;
            font-size: 28px;
        }
        .message {
            color: #666;
            margin-bottom: 24px;
            line-height: 1.6;
            font-size: 16px;
        }
        .countdown {
            font-size: 48px;
            font-weight: bold;
            color: #667eea;
            margin: 24px 0;
        }
        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 32px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        .info-text {
            color: #999;
            font-size: 14px;
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎉 promps.org は移転しました</h1>
        <p class="message">
            prompsはより充実した機能を提供する新しいドメインに移転しました。<br>
            <strong>https://zundou.org</strong> へ自動的にリダイレクトされます。
        </p>
        <div class="countdown">
            <span id="countdown">3</span>秒後に移動します
        </div>
        <div class="button-group">
            <a href="https://zundou.org" class="btn btn-primary">今すぐ移動する</a>
            <button class="btn btn-secondary" onclick="location.href = 'https://zundou.org'">移動</button>
        </div>
        <p class="info-text">リダイレクトされない場合は、上のボタンをクリックしてください。</p>
    </div>

    <script>
        let seconds = 3;
        const countdownElement = document.getElementById('countdown');

        // 即時リダイレクト（フォールバック用）
        setTimeout(() => {
            location.href = 'https://zundou.org';
        }, 3000);

        // カウントダウン表示
        const timer = setInterval(() => {
            seconds--;
            if (seconds < 0) {
                clearInterval(timer);
            } else {
                countdownElement.textContent = seconds;
            }
        }, 1000);
    </script>
</body>
</html>
