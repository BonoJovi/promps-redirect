<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="3;url=https://zundou.org">
    <title data-i18n="title"></title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .lang-selector {
            position: absolute;
            top: 16px;
            right: 16px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            max-width: 300px;
            justify-content: flex-end;
        }
        .lang-btn {
            padding: 6px 12px;
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid transparent;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.3s ease;
            color: #333;
        }
        .lang-btn:hover {
            background: white;
            transform: scale(1.05);
        }
        .lang-btn.active {
            border-color: #667eea;
            color: #667eea;
            font-weight: bold;
        }
        .container {
            background: white;
            border-radius: 12px;
            padding: 48px 32px;
            max-width: 600px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 16px;
            font-size: 28px;
        }
        .message {
            color: #666;
            margin-bottom: 24px;
            line-height: 1.6;
            font-size: 16px;
        }
        .countdown {
            font-size: 48px;
            font-weight: bold;
            color: #667eea;
            margin: 24px 0;
        }
        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 32px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        .info-text {
            color: #999;
            font-size: 14px;
            margin-top: 16px;
        }
        @media (max-width: 600px) {
            .container {
                padding: 32px 16px;
            }
            h1 {
                font-size: 24px;
            }
            .lang-selector {
                width: 100%;
                position: static;
                margin-bottom: 24px;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="lang-selector" id="langSelector"></div>

    <div class="container">
        <h1 data-i18n="title"></h1>
        <p class="message" data-i18n="message"></p>
        <div class="countdown">
            <span id="countdown">3</span><span data-i18n="countdownText"></span>
        </div>
        <div class="button-group">
            <a href="https://zundou.org" class="btn btn-primary" data-i18n="btnMove"></a>
            <button class="btn btn-secondary" onclick="location.href = 'https://zundou.org'" data-i18n="btnNavigate"></button>
        </div>
        <p class="info-text" data-i18n="infoText"></p>
    </div>

    <script>
        // Translations for 7 languages
        const TRANSLATIONS = {
            ja: {
                'title': '🎉 promps.org は移転しました',
                'message': 'prompsはより充実した機能を提供する新しいドメインに移転しました。<br><strong>https://zundou.org</strong> へ自動的にリダイレクトされます。',
                'countdownText': '秒後に移動します',
                'btnMove': '今すぐ移動する',
                'btnNavigate': '移動',
                'infoText': 'リダイレクトされない場合は、上のボタンをクリックしてください。'
            },
            en: {
                'title': '🎉 promps.org has moved',
                'message': 'Promps has moved to a new domain with enhanced features.<br>You will be automatically redirected to <strong>https://zundou.org</strong>.',
                'countdownText': ' seconds until redirect',
                'btnMove': 'Go Now',
                'btnNavigate': 'Navigate',
                'infoText': 'If you are not redirected, please click the button above.'
            },
            fr: {
                'title': '🎉 promps.org a déménagé',
                'message': 'Promps a déménagé vers un nouveau domaine avec des fonctionnalités améliorées.<br>Vous serez automatiquement redirigé vers <strong>https://zundou.org</strong>.',
                'countdownText': ' secondes avant la redirection',
                'btnMove': 'Aller maintenant',
                'btnNavigate': 'Naviguer',
                'infoText': 'Si vous n\'êtes pas redirigé, veuillez cliquer sur le bouton ci-dessus.'
            },
            it: {
                'title': '🎉 promps.org si è trasferito',
                'message': 'Promps si è trasferito a un nuovo dominio con funzionalità migliorate.<br>Sarai automaticamente reindirizzato a <strong>https://zundou.org</strong>.',
                'countdownText': ' secondi prima del reindirizzamento',
                'btnMove': 'Vai ora',
                'btnNavigate': 'Naviga',
                'infoText': 'Se non sei reindirizzato, fai clic sul pulsante sopra.'
            },
            de: {
                'title': '🎉 promps.org ist umgezogen',
                'message': 'Promps ist auf eine neue Domain mit erweiterten Funktionen umgezogen.<br>Sie werden automatisch zu <strong>https://zundou.org</strong> weitergeleitet.',
                'countdownText': ' Sekunden bis zur Umleitung',
                'btnMove': 'Jetzt gehen',
                'btnNavigate': 'Navigieren',
                'infoText': 'Wenn Sie nicht weitergeleitet werden, klicken Sie bitte auf die Schaltfläche oben.'
            },
            ru: {
                'title': '🎉 promps.org переехал',
                'message': 'Promps переехал на новый домен с расширенными функциями.<br>Вы будете автоматически перенаправлены на <strong>https://zundou.org</strong>.',
                'countdownText': ' секунд до перенаправления',
                'btnMove': 'Перейти сейчас',
                'btnNavigate': 'Навигация',
                'infoText': 'Если вы не перенаправлены, нажмите кнопку выше.'
            },
            ar: {
                'title': '🎉 لقد انتقل promps.org',
                'message': 'انتقل Promps إلى نطاق جديد مع ميزات محسّنة.<br>سيتم إعادة توجيهك تلقائياً إلى <strong>https://zundou.org</strong>.',
                'countdownText': ' ثانية حتى إعادة التوجيه',
                'btnMove': 'انتقل الآن',
                'btnNavigate': 'التنقل',
                'infoText': 'إذا لم يتم إعادة توجيهك، يرجى النقر على الزر أعلاه.'
            }
        };

        // Language codes in order
        const LANGUAGES = ['en', 'ja', 'fr', 'it', 'de', 'ru', 'ar'];

        // Detect user language
        function detectLanguage() {
            const browserLang = navigator.language.split('-')[0];
            if (TRANSLATIONS[browserLang]) {
                return browserLang;
            }
            return 'en'; // Default to English
        }

        // Set current language
        let currentLang = detectLanguage();

        // Check for stored preference
        const storedLang = localStorage.getItem('prompsRedirectLang');
        if (storedLang && TRANSLATIONS[storedLang]) {
            currentLang = storedLang;
        }

        // Update page language
        function setLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('prompsRedirectLang', lang);
            document.documentElement.lang = lang;

            // Update all elements with data-i18n
            document.querySelectorAll('[data-i18n]').forEach(element => {
                const key = element.getAttribute('data-i18n');
                const translation = TRANSLATIONS[currentLang][key];
                if (translation) {
                    if (element.tagName === 'TITLE') {
                        element.textContent = translation;
                    } else if (key === 'message') {
                        element.innerHTML = translation;
                    } else {
                        element.textContent = translation;
                    }
                }
            });

            // Update language selector buttons
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.lang === lang) {
                    btn.classList.add('active');
                }
            });
        }

        // Create language selector
        function initLanguageSelector() {
            const selector = document.getElementById('langSelector');
            LANGUAGES.forEach(lang => {
                const btn = document.createElement('button');
                btn.className = 'lang-btn';
                btn.dataset.lang = lang;
                btn.textContent = lang.toUpperCase();
                btn.onclick = () => setLanguage(lang);
                selector.appendChild(btn);
            });
        }

        // Countdown
        function startCountdown() {
            let seconds = 3;
            const countdownElement = document.getElementById('countdown');

            // Auto redirect after 3 seconds
            setTimeout(() => {
                location.href = 'https://zundou.org';
            }, 3000);

            // Update countdown display
            const timer = setInterval(() => {
                seconds--;
                if (seconds < 0) {
                    clearInterval(timer);
                } else {
                    countdownElement.textContent = seconds;
                }
            }, 1000);
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            initLanguageSelector();
            setLanguage(currentLang);
            startCountdown();
        });
    </script>
</body>
</html>
